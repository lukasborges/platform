name: Upstream Radar

on:
  schedule:
    # 09:17 UTC = 06:17 in Sao Paulo. The odd minute reduces scheduler congestion.
    - cron: "17 9 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: upstream-radar
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out Platform
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Check active upstream forks
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/upstream-watch.mjs
