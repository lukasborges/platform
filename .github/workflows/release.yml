name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    if: "!contains(github.event.head_commit.message, '[skip release]')"
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "yarn"

      - name: Enable Corepack
        run: corepack enable

      - name: Install system dependencies (build + RPM tooling)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            graphicsmagick libxtst-dev libx11-dev \
            rpm

      - name: Install Wine (WineHQ stable, for Windows cross-build)
        run: |
          sudo dpkg --add-architecture i386
          sudo mkdir -pm755 /etc/apt/keyrings
          sudo wget -qO /etc/apt/keyrings/winehq-archive.key https://dl.winehq.org/wine-builds/winehq.key
          codename=$(lsb_release -cs)
          sudo wget -qNP /etc/apt/sources.list.d/ "https://dl.winehq.org/wine-builds/ubuntu/dists/${codename}/winehq-${codename}.sources"
          sudo apt-get update
          sudo apt-get install -y --install-recommends winehq-stable
          wine --version

      - name: Install Node dependencies
        run: yarn install --immutable

      - name: Compute next fork version
        id: version
        run: |
          last_n=$(git tag --list 'v3.3.0-fork.*' | sed 's/.*\.//' | sort -n | tail -1)
          next_n=$((${last_n:-0} + 1))
          tag="v3.3.0-fork.${next_n}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "next_n=${next_n}" >> "$GITHUB_OUTPUT"
          echo "Next release tag: ${tag}"

      - name: Bump package.json version to match tag
        run: bash scripts/bump-version.sh "${{ steps.version.outputs.next_n }}"

      - name: Build workspaces
        run: yarn build

      - name: Build Linux + Windows installers
        working-directory: packages/app
        env:
          NODE_ENV: production
        run: ../../node_modules/.bin/electron-builder --linux AppImage --linux deb --win

      - name: Build RPM
        run: bash scripts/build-rpm.sh

      - name: Push tag
        run: |
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub release
        env:
          TAG: ${{ steps.version.outputs.tag }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          notes_file=$(mktemp)
          {
            printf 'Automated release from commit [`%s`](%s/%s/commit/%s).\n\n' \
              "${GITHUB_SHA::7}" "$GITHUB_SERVER_URL" "$GITHUB_REPOSITORY" "$GITHUB_SHA"
            printf '## Commit\n\n```\n'
            printf '%s\n' "$COMMIT_MSG"
            printf '```\n\n'
            printf '## Artifacts\n\n'
            printf '### Linux (x86_64)\n- `Station-x86_64.AppImage` — distro-agnostic\n- `Station-amd64.deb` — Debian / Ubuntu\n- `Station-x86_64.rpm` — Fedora / RHEL (built with `scripts/build-rpm.sh`)\n\n'
            printf '### Windows (x86_64)\n- `Station-Setup.exe` — NSIS installer (cross-built from Linux via wine)\n- `Station-Setup.exe.blockmap` — auto-update delta metadata\n\n'
            printf '### Auto-update metadata\n- `latest-linux.yml`, `latest.yml`\n\n'
            printf 'macOS build is not included.\n'
          } > "$notes_file"

          gh release create "$TAG" \
            --prerelease \
            --title "$TAG" \
            --notes-file "$notes_file" \
            release/Station-x86_64.AppImage \
            release/Station-amd64.deb \
            release/Station-x86_64.rpm \
            release/Station-Setup.exe \
            release/Station-Setup.exe.blockmap \
            release/latest-linux.yml \
            release/latest.yml
